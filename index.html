<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A modern, responsive calculator web application with advanced features">
    <meta name="keywords" content="calculator, web calculator, modern calculator, responsive calculator">
    <meta name="author" content="Christine Wanja - CodeAlpha Frontend Development Internship">
    <title>Modern Calculator | Professional Web Application</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header with theme toggle -->
        <header class="app-header">
            <h1 class="app-title">Calculator</h1>
            <div class="header-controls">
                <button 
                    class="icon-btn" 
                    id="historyToggle" 
                    aria-label="Toggle calculation history"
                    title="Calculation History"
                >
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 3v5h5"/>
                        <path d="M3.05 13A9 9 0 1 0 6 5.3L3 8"/>
                        <path d="M12 7v5l4 2"/>
                    </svg>
                </button>
                <button 
                    class="icon-btn" 
                    id="themeToggle" 
                    aria-label="Toggle dark mode"
                    title="Toggle Dark Mode"
                >
                    <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"/>
                        <line x1="12" y1="1" x2="12" y2="3"/>
                        <line x1="12" y1="21" x2="12" y2="23"/>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                        <line x1="1" y1="12" x2="3" y2="12"/>
                        <line x1="21" y1="12" x2="23" y2="12"/>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                    </svg>
                    <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                    </svg>
                </button>
            </div>
        </header>

        <main class="calculator-wrapper">
            <!-- Calculator Card -->
            <div class="calculator-card">
                <!-- Display Section -->
                <div class="calculator-display">
                    <div class="display-expression" id="expressionDisplay" aria-live="polite"></div>
                    <div class="display-main" id="mainDisplay">0</div>
                    <div class="display-indicator" id="memoryIndicator"></div>
                </div>

                <!-- Memory Buttons -->
                <div class="memory-buttons">
                    <button 
                        class="btn btn-memory" 
                        data-action="memory-clear" 
                        aria-label="Memory Clear"
                    >
                        MC
                    </button>
                    <button 
                        class="btn btn-memory" 
                        data-action="memory-recall" 
                        aria-label="Memory Recall"
                    >
                        MR
                    </button>
                    <button 
                        class="btn btn-memory" 
                        data-action="memory-plus" 
                        aria-label="Memory Plus"
                    >
                        M+
                    </button>
                    <button 
                        class="btn btn-memory" 
                        data-action="memory-minus" 
                        aria-label="Memory Minus"
                    >
                        M-
                    </button>
                </div>

                <!-- Scientific Mode Toggle -->
                <button 
                    class="scientific-toggle" 
                    id="scientificToggle" 
                    aria-label="Toggle scientific mode"
                >
                    <span class="toggle-icon">ƒ(x)</span>
                    <span class="toggle-text">Scientific</span>
                </button>

                <!-- Scientific Functions (Hidden by default) -->
                <div class="scientific-functions" id="scientificFunctions" aria-hidden="true">
                    <button class="btn btn-scientific" data-action="sin" aria-label="Sine">sin</button>
                    <button class="btn btn-scientific" data-action="cos" aria-label="Cosine">cos</button>
                    <button class="btn btn-scientific" data-action="tan" aria-label="Tangent">tan</button>
                    <button class="btn btn-scientific" data-action="log" aria-label="Logarithm">log</button>
                    <button class="btn btn-scientific" data-action="ln" aria-label="Natural Logarithm">ln</button>
                    <button class="btn btn-scientific" data-action="sqrt" aria-label="Square Root">√</button>
                    <button class="btn btn-scientific" data-action="power" aria-label="Power">x^y</button>
                    <button class="btn btn-scientific" data-action="pi" aria-label="Pi">π</button>
                </div>

                <!-- Calculator Keypad -->
                <div class="calculator-keypad">
                    <!-- Row 1 -->
                    <button class="btn btn-clear" data-action="all-clear" aria-label="All Clear">AC</button>
                    <button class="btn btn-clear" data-action="clear" aria-label="Clear">C</button>
                    <button class="btn btn-operator" data-action="backspace" aria-label="Backspace">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/>
                            <line x1="18" y1="9" x2="12" y2="15"/>
                            <line x1="12" y1="9" x2="18" y2="15"/>
                        </svg>
                    </button>
                    <button class="btn btn-operator" data-action="divide" aria-label="Divide">÷</button>

                    <!-- Row 2 -->
                    <button class="btn btn-number" data-number="7" aria-label="Seven">7</button>
                    <button class="btn btn-number" data-number="8" aria-label="Eight">8</button>
                    <button class="btn btn-number" data-number="9" aria-label="Nine">9</button>
                    <button class="btn btn-operator" data-action="multiply" aria-label="Multiply">×</button>

                    <!-- Row 3 -->
                    <button class="btn btn-number" data-number="4" aria-label="Four">4</button>
                    <button class="btn btn-number" data-number="5" aria-label="Five">5</button>
                    <button class="btn btn-number" data-number="6" aria-label="Six">6</button>
                    <button class="btn btn-operator" data-action="subtract" aria-label="Subtract">−</button>

                    <!-- Row 4 -->
                    <button class="btn btn-number" data-number="1" aria-label="One">1</button>
                    <button class="btn btn-number" data-number="2" aria-label="Two">2</button>
                    <button class="btn btn-number" data-number="3" aria-label="Three">3</button>
                    <button class="btn btn-operator" data-action="add" aria-label="Add">+</button>

                    <!-- Row 5 -->
                    <button class="btn btn-number" data-action="toggle-sign" aria-label="Toggle Positive/Negative">±</button>
                    <button class="btn btn-number" data-number="0" aria-label="Zero">0</button>
                    <button class="btn btn-number" data-action="decimal" aria-label="Decimal Point">.</button>
                    <button class="btn btn-equal" data-action="calculate" aria-label="Calculate">=</button>

                    <!-- Percentage Button -->
                    <button class="btn btn-operator btn-percent" data-action="percentage" aria-label="Percentage">%</button>
                </div>
            </div>

            <!-- History Panel -->
            <aside class="history-panel" id="historyPanel" aria-hidden="true">
                <div class="history-header">
                    <h2>History</h2>
                    <button class="icon-btn" id="clearHistory" aria-label="Clear history">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="3 6 5 6 21 6"/>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                        </svg>
                    </button>
                </div>
                <div class="history-list" id="historyList">
                    <div class="history-empty">No calculations yet</div>
                </div>
            </aside>
        </main>

        <!-- Footer -->
        <footer class="app-footer">
            <p>Built with HTML, CSS & JavaScript</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
